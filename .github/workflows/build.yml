name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all versions with Stonecutter
        # 通过 chiseledBuild 任务构建所有注册的版本
        run: ./gradlew chiseledBuild

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenBoatUtils-builds
          path: |
            versions/*/build/libs/!(*-dev.jar|*-sources.jar)
            build/libs/!(*-dev.jar|*-sources.jar)
